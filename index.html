<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title class="class="fa-brands fa-instagram"">Password Generator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Password Generator</h1>
        <label for="length">Password Length:</label>
        <input type="number" id="length" name="passwordLength" min="8" max="40" placeholder ="Enter length (8-40)" required><br>
        <div class="radio-container">
        <input type="radio" name="uppercase" id="uppercase"> 
        <label for="uppercase">Include Uppercase Letters</label><br>
        <input type="radio" name="lowercase" id="lowercase">
        <label for="lowercase">Include Lowercase Letters</label><br>
        <input type="radio" name="numbers" id="numbers">
        <label for="numbers">Include Numbers</label><br>
        <input type="radio" name="symbols" id="symbols">
        <label for="symbols">Include Symbols</label><br>
        </div>
        <h3 id="output"></h3><br>
        <button onclick="generatePassword()">Generate Password</button>
        <button onclick="unselectAll()">Unselect All</button> 
    </div>

    <script src="js/script.js"></script>
</body>
</html>
